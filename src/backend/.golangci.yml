version: "2"

run:
  timeout: 5m
  go: "1.26.3"

linters:
  enable:
    - errcheck      # 检查未处理的错误
    - govet         # 官方静态分析
    - ineffassign   # 检查无效赋值
    - staticcheck   # 高级静态分析（包含 gosimple）
    - unused        # 检查未使用的代码
    - misspell      # 拼写检查
    - prealloc      # 预分配建议

formatters:
  enable:
    - gofmt         # 格式化检查

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
