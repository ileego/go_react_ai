run:
  timeout: 5m
  go: "1.26.3"

linters:
  enable:
    - errcheck      # 检查未处理的错误
    - gosimple      # 简化代码建议
    - govet         # 官方静态分析
    - ineffassign   # 检查无效赋值
    - staticcheck   # 高级静态分析
    - unused        # 检查未使用的代码
    - gofmt         # 格式化检查
    - misspell      # 拼写检查
    - prealloc      # 预分配建议
    - revive        # 通用代码规范

linters-settings:
  revive:
    rules:
      - name: exported
        arguments: ["checkPrivateReceivers", "sayRepetitiveInsteadOfStutters"]
      - name: var-naming
        arguments: [["ID", "URL", "API"], []]

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
