openapi: 3.0.3
info:
  title: Go + React + AI Platform API
  description: 深度研究与报告生成平台 API
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/ileego/go_react_ai

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境

paths:
  /health:
    get:
      summary: 健康检查
      operationId: healthCheck
      tags:
        - System
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /reports:
    get:
      summary: 获取报告列表
      operationId: listReports
      tags:
        - Reports
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: 报告列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"

    post:
      summary: 创建报告
      operationId: createReport
      tags:
        - Reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}:
    get:
      summary: 获取报告详情
      operationId: getReport
      tags:
        - Reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 报告详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: 报告不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{id}/cancel:
    post:
      summary: 取消报告生成
      operationId: cancelReport
      tags:
        - Reports
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: 报告状态不允许取消
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/{report_id}/dispatch:
    post:
      summary: 异步派发报告生成任务
      description: |
        将报告生成任务提交到后台 Worker Pool，接口立即返回"任务已提交"。
        实际生成过程在后台 goroutine 中异步执行，可通过 GET /reports/{id} 查询报告状态。
      operationId: dispatchReport
      tags:
        - Reports
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 任务已提交
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                code: 0
                message: "任务已提交"
        "400":
          description: 参数错误或报告状态不允许派发
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 报告不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        data:
          type: object
          properties:
            status:
              type: string
              example: "ok"
            time:
              type: integer
              format: int64

    Report:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        topic:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        content:
          type: string
        sources:
          type: array
          items:
            type: string
        created_by:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateReportRequest:
      type: object
      required: [title, topic]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: 报告标题
        topic:
          type: string
          minLength: 1
          maxLength: 500
          description: 研究主题

    ReportListResponse:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/Report"
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
